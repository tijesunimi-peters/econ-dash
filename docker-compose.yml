services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: econ
      POSTGRES_PASSWORD: econ_dev
      POSTGRES_DB: econ_dashboard_development
    ports:
      - "6543:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U econ"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: econ-dashboard-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8051:3000"
    env_file: ./backend/.env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://econ:econ_dev@db:5432/econ_dashboard_development
      DASH_ORIGIN: http://localhost:8050
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle

  frontend:
    container_name: econ-dashboard-frontend
    build: ./frontend
    ports:
      - "8050:8050"
    env_file: ./frontend/.env
    environment:
      RAILS_API_URL: http://backend:3000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  pgdata:
  backend_bundle:
